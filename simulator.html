<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 Simulator Remote</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background-color: #2c3e50; color: white; padding: 40px; }
    .control-panel { 
      background: #34495e; padding: 30px; border-radius: 15px; 
      display: inline-block; box-shadow: 0 8px 16px rgba(0,0,0,0.3); 
    }
    .input-group { margin-bottom: 15px; }
    label { display: inline-block; width: 180px; text-align: right; margin-right: 15px; font-size: 18px; }
    input { padding: 10px; border-radius: 5px; border: none; font-size: 16px; width: 100px; text-align: center; font-weight: bold;}
    button { 
      padding: 12px 25px; margin-top: 20px; font-size: 18px; font-weight: bold;
      background-color: #27ae60; color: white; border: none; border-radius: 8px; 
      cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.2s;
    }
    button:active { transform: scale(0.95); background-color: #2ecc71; }
  </style>
</head>
<body>
  <h2>📱 รีโมทจำลอง ESP32 (Simulator)</h2>
  <div class="control-panel">
    <div class="input-group">
      <label>พิกัด X (ซ้าย-ขวา):</label>
      <input type="number" id="inputX" value="200">
    </div>
    <div class="input-group">
      <label>พิกัด Y (บน-ล่าง):</label>
      <input type="number" id="inputY" value="150">
    </div>
    <div class="input-group">
      <label>ความแรงสัญญาณ (RSSI):</label>
      <input type="number" id="inputRSSI" value="-45">
    </div>
    <button onclick="sendData()">📡 ยิงข้อมูลขึ้น Firebase</button>
    <p id="status" style="color: #f1c40f; font-weight: bold; margin-top: 15px; height: 20px;"></p>
  </div>

  <script>
    // เชื่อมต่อฐานข้อมูล Firebase ตัวเดิมของคุณ
    const firebaseConfig = {
      databaseURL: "https://wi-fi-heatmap-1d73a-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function sendData() {
      // ดึงค่าตัวเลขจากช่องกรอกข้อมูล
      const x = parseInt(document.getElementById('inputX').value);
      const y = parseInt(document.getElementById('inputY').value);
      const rssi = parseInt(document.getElementById('inputRSSI').value);

      // ยิงข้อมูลไปสร้างจุดใหม่ที่ชื่อ "ESP_Simulator" ใน Firebase
      db.ref("WiFi_Scan/ESP_Simulator").set({
        x: x,
        y: y,
        rssi: rssi
      }).then(() => {
        // แสดงข้อความเมื่อส่งสำเร็จ
        const statusText = document.getElementById('status');
        statusText.innerText = "✅ ส่งข้อมูลสำเร็จ! (หันไปดูหน้า Dashboard สิ)";
        setTimeout(() => { statusText.innerText = ""; }, 3000); // ข้อความหายไปเองใน 3 วินาที
      }).catch((error) => {
        console.error("Error:", error);
      });
    }
  </script>
</body>
</html>
